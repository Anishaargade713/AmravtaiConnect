server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

amravati.app.jwtSecret=mySuperSecretKeyForAmravatiConnectLocalDevEnvironment123456789
amravati.app.frontendUrl=${FRONTEND_URL:http://localhost:5173}
amravati.app.cookie.secure=true
amravati.app.cookie.sameSite=None

# Increase maximum HTTP header size (prevents Request header too large errors due to local cookie bloat)
server.max-http-header-size=65536
server.tomcat.max-http-header-size=65536
